<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cross-Reference Index — Electric Technocracy</title>
<meta name="description" content="Searchable cross-reference index of persons, places, installations, cable lines and units with in-page backlinks across the Electric Technocracy archive."/>
<link rel="canonical" href="https://et-pioneer.github.io/electric-navigator/xref.html"/>
<link rel="stylesheet" href="./assets/css/style.css"/>
<style>
  .xref-shell{padding:1.5rem 1rem;max-width:1100px;margin:0 auto}
  .xref-controls{display:flex;flex-wrap:wrap;gap:.5rem;margin:1rem 0;position:sticky;top:0;background:var(--bg);padding:.6rem 0;z-index:10}
  .xref-controls input,.xref-controls select{padding:.55rem .75rem;border:1px solid var(--border);border-radius:6px;font-size:1rem;background:#fff;color:var(--text)}
  .xref-controls input{flex:1;min-width:240px}
  .cat{margin:1.5rem 0;padding-top:.5rem;border-top:2px solid var(--nato-gold)}
  .cat h2{margin:.25rem 0;color:var(--nato-blue);text-transform:capitalize}
  .term{margin:.6rem 0;padding:.7rem;background:#fff;border:1px solid var(--border);border-left:3px solid var(--nato-blue);border-radius:6px}
  .term h3{margin:0 0 .25rem;font-size:1rem;display:flex;justify-content:space-between;align-items:baseline;gap:.5rem}
  .term h3 small{color:var(--muted);font-weight:400}
  .term ul{margin:.25rem 0 0 1rem;padding:0;font-size:.9rem}
  .term a{color:var(--nato-blue)}
  .toc{display:flex;flex-wrap:wrap;gap:.5rem;margin:.5rem 0 1rem}
  .toc a{padding:.3rem .7rem;background:var(--nato-blue);color:#fff;border-radius:4px;text-decoration:none;font-size:.85rem}
  .toc a:hover{background:var(--nato-gold);color:var(--nato-blue)}
  .anchor{scroll-margin-top:80px}
  .stats{color:var(--muted);font-size:.9rem}
  .hidden{display:none}
</style>
</head>
<body>
<header class="site-header"><div class="container header-inner">
  <a class="brand" href="./index.html"><span class="brand-mark">⚡</span><span class="brand-text"><span class="brand-title">Electric Technocracy</span><span class="brand-tag">Cross-Reference Index</span></span></a>
</div></header>
<main class="xref-shell" id="main">
  <h1>🔗 Cross-Reference Index</h1>
  <p class="stats">Persons, places, installations, cable lines and units mentioned across the English dossier and PDF archive. Each entry links back to the source document.</p>
  <nav class="toc" id="toc"></nav>
  <div class="xref-controls">
    <input id="q" type="search" placeholder="Filter terms…" autofocus />
    <select id="cat"><option value="">All categories</option></select>
  </div>
  <div id="content"><p class="stats">Loading…</p></div>
  <p style="margin-top:2rem"><a href="./index.html">← Home</a> · <a href="./search.html">Full-text search</a> · <a href="./sitemaps.html">Sitemaps</a> · <a href="./audit.html">Audit</a></p>
</main>
<script>
(async function(){
  const content = document.getElementById("content");
  const toc = document.getElementById("toc");
  const catSel = document.getElementById("cat");
  const q = document.getElementById("q");
  let data;
  try { data = await (await fetch("data/xref.json", {cache:"no-store"})).json(); }
  catch(e){ content.innerHTML = "<p>Index not built. Run: <code>node scripts/build-xref.mjs</code></p>"; return; }

  const cats = Object.keys(data);
  cats.forEach(c => {
    const a = document.createElement("a"); a.href = "#cat-"+c; a.textContent = c+" ("+Object.keys(data[c]).length+")"; toc.appendChild(a);
    const o = document.createElement("option"); o.value = c; o.textContent = c; catSel.appendChild(o);
  });

  function render(){
    const term = q.value.trim().toLowerCase();
    const onlyCat = catSel.value;
    let html = "";
    for (const c of cats){
      if (onlyCat && c !== onlyCat) continue;
      const entries = Object.entries(data[c]).filter(([k]) => !term || k.toLowerCase().includes(term));
      if (!entries.length) continue;
      html += `<section class="cat anchor" id="cat-${c}"><h2>${c} <small style="font-size:.7em;color:#888">(${entries.length})</small></h2>`;
      for (const [name, hits] of entries){
        const slug = c+"-"+name.toLowerCase().replace(/[^a-z0-9]+/g,"-");
        html += `<div class="term anchor" id="${slug}"><h3><span>${name}</span><small>${hits.length} doc${hits.length===1?"":"s"} · <a href="#${slug}">¶</a></small></h3><ul>`;
        for (const h of hits) html += `<li><a href="${h.url}" rel="noopener" target="_blank">${h.name}</a></li>`;
        html += `</ul></div>`;
      }
      html += `</section>`;
    }
    content.innerHTML = html || "<p class='stats'>No matches.</p>";
  }
  q.addEventListener("input", render);
  catSel.addEventListener("change", render);
  render();
  // Deep link: #cat-persons-tesla
  if (location.hash){ const el = document.querySelector(location.hash); if (el) el.scrollIntoView(); }
})();
</script>
</body></html>
